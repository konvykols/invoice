<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONVY KOL — สร้างเอกสาร</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans Thai', 'Noto Sans SC', -apple-system, sans-serif;
    background: linear-gradient(180deg, #F0E4FD 0%, #F8F0FE 60%, #ffffff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #000;
  }
  .card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 28px 24px 32px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(247,49,115,0.12);
  }
  .lang-row {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 18px;
  }
  .lang-btn {
    background: white;
    color: #000;
    border: 1px solid #E1C8F8;
    border-radius: 10px;
    padding: 6px 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.2s;
  }
  .lang-btn:hover { border-color: #a561ef; }
  .lang-btn .flag {
    width: 18px;
    height: 12px;
    border-radius: 2px;
    display: block;
    flex-shrink: 0;
  }
  .lang-btn.active {
    background: #a561ef;
    color: white;
    border-color: #a561ef;
  }
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 2px;
    color: #a561ef;
    font-weight: 500;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 30px;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  h1 .accent { color: #a561ef; }
  .sub {
    font-size: 13px;
    color: #000;
    opacity: 0.6;
  }
  .step-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #a561ef;
    color: white;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-label {
    font-size: 12px;
    font-weight: 500;
    color: #000;
  }
  .doc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .doc-card {
    background: white;
    border: 1px solid #E1C8F8;
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .doc-card:hover {
    border-color: #a561ef;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(247,49,115,0.15);
  }
  .doc-card.selected {
    border: 2px solid #a561ef;
    background: #F8F0FE;
  }
  .icon-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #F0E4FD;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }
  .doc-title {
    font-size: 15px;
    font-weight: 600;
    color: #000;
    margin-bottom: 2px;
  }
  .doc-sub {
    font-size: 11px;
    color: #000;
    opacity: 0.5;
    margin-bottom: 10px;
  }
  .doc-desc {
    font-size: 11px;
    color: #000;
    background: #F0E4FD;
    padding: 6px 8px;
    border-radius: 8px;
    font-weight: 500;
  }
  .cta {
    background: #a561ef;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: all 0.2s;
  }
  .cta:hover {
    background: #8a3fd9;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(247,49,115,0.3);
  }
  .cta:disabled {
    background: #E1C8F8;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
</style>
</head>
<body>

<div class="card">

  <div class="lang-row">
    <button class="lang-btn active" data-lang="th">
      <svg class="flag" viewBox="0 0 18 12"><rect width="18" height="12" fill="#ED1C24"/><rect y="2" width="18" height="8" fill="#fff"/><rect y="4" width="18" height="4" fill="#241D4F"/></svg>
      ไทย
    </button>
    <button class="lang-btn" data-lang="en">
      <svg class="flag" viewBox="0 0 18 12"><rect width="18" height="12" fill="#fff"/><rect width="18" height="1" y="0" fill="#B22234"/><rect width="18" height="1" y="2" fill="#B22234"/><rect width="18" height="1" y="4" fill="#B22234"/><rect width="18" height="1" y="6" fill="#B22234"/><rect width="18" height="1" y="8" fill="#B22234"/><rect width="18" height="1" y="10" fill="#B22234"/><rect width="8" height="6" fill="#3C3B6E"/></svg>
      EN
    </button>
    <button class="lang-btn" data-lang="cn">
      <svg class="flag" viewBox="0 0 18 12"><rect width="18" height="12" fill="#EE1C25"/><text x="3" y="5" font-size="3.5" fill="#FFFF00" text-anchor="middle">★</text><text x="6.5" y="3" font-size="1.6" fill="#FFFF00" text-anchor="middle">★</text><text x="7.5" y="4.5" font-size="1.6" fill="#FFFF00" text-anchor="middle">★</text><text x="7.5" y="6.5" font-size="1.6" fill="#FFFF00" text-anchor="middle">★</text><text x="6.5" y="8" font-size="1.6" fill="#FFFF00" text-anchor="middle">★</text></svg>
      中文
    </button>
  </div>

  <div class="header">
    <div class="badge">✦ KOL DOCUMENT SYSTEM ✦</div>
    <h1 id="t-title">สร้างเอกสาร <span class="accent">KOL</span></h1>
    <p class="sub" id="t-sub">เลือกแบบเอกสาร · ใส่ข้อมูล · ส่งให้ทีม KONVY</p>
  </div>

  <div class="step-row">
    <div class="step-num">1</div>
    <div class="step-label" id="t-step1">เลือกประเภทเอกสาร</div>
  </div>

  <div class="doc-grid">

    <div class="doc-card" data-doc="quotation">
      <div class="icon-circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a561ef" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <path d="M14 2v6h6"/>
          <path d="M9 13h4"/>
        </svg>
      </div>
      <div class="doc-title" id="t-quote-title">ใบเสนอราคา</div>
      <div class="doc-sub" id="t-quote-sub">Quotation</div>
      <div class="doc-desc" id="t-quote-desc">ก่อนเริ่มงาน</div>
    </div>

    <div class="doc-card" data-doc="invoice">
      <div class="icon-circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a561ef" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M3 10h18"/>
          <circle cx="8" cy="15" r="1"/>
        </svg>
      </div>
      <div class="doc-title" id="t-inv-title">ใบแจ้งหนี้</div>
      <div class="doc-sub" id="t-inv-sub">Invoice</div>
      <div class="doc-desc" id="t-inv-desc">หลังจบงาน</div>
    </div>

  </div>

  <button class="cta" id="t-cta" disabled>เริ่มกันเลย ✨</button>

</div>

<script>
const dict = {
  th: {
    title: 'สร้างเอกสาร <span class="accent">KOL</span>',
    sub: "เลือกแบบเอกสาร · ใส่ข้อมูล · ส่งให้ทีม KONVY",
    step1: "เลือกประเภทเอกสาร",
    qt: "ใบเสนอราคา", qs: "Quotation", qd: "ก่อนเริ่มงาน",
    it: "ใบแจ้งหนี้", is: "Invoice", id: "หลังจบงาน",
    cta: "เริ่มกันเลย ✨"
  },
  en: {
    title: 'Create <span class="accent">KOL</span> Document',
    sub: "Choose template · Fill in · Submit to KONVY",
    step1: "Choose document type",
    qt: "Quotation", qs: "ใบเสนอราคา", qd: "Before the project",
    it: "Invoice", is: "ใบแจ้งหนี้", id: "After the project",
    cta: "Let's get started ✨"
  },
  cn: {
    title: '创建 <span class="accent">KOL</span> 文件',
    sub: "选择模板 · 填写信息 · 提交给 KONVY",
    step1: "选择文件类型",
    qt: "报价单", qs: "Quotation", qd: "项目开始前",
    it: "发票", is: "Invoice", id: "项目结束后",
    cta: "开始吧 ✨"
  }
};

let currentLang = "th";
let currentDoc = null;

function applyLang(lang) {
  currentLang = lang;
  const d = dict[lang];
  document.getElementById("t-title").innerHTML = d.title;
  document.getElementById("t-sub").textContent = d.sub;
  document.getElementById("t-step1").textContent = d.step1;
  document.getElementById("t-quote-title").textContent = d.qt;
  document.getElementById("t-quote-sub").textContent = d.qs;
  document.getElementById("t-quote-desc").textContent = d.qd;
  document.getElementById("t-inv-title").textContent = d.it;
  document.getElementById("t-inv-sub").textContent = d.is;
  document.getElementById("t-inv-desc").textContent = d.id;
  document.getElementById("t-cta").textContent = d.cta;
  document.querySelectorAll(".lang-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
}

function selectDoc(doc) {
  currentDoc = doc;
  document.querySelectorAll(".doc-card").forEach(c => {
    c.classList.toggle("selected", c.dataset.doc === doc);
  });
  document.getElementById("t-cta").disabled = false;
}

document.querySelectorAll(".lang-btn").forEach(b => {
  b.addEventListener("click", () => applyLang(b.dataset.lang));
});
document.querySelectorAll(".doc-card").forEach(c => {
  c.addEventListener("click", () => selectDoc(c.dataset.doc));
});
// Open URL in external browser (Safari/Chrome) — kicks out of LINE/WeChat/FB/IG in-app browsers
function openInExternalBrowser(url) {
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/.test(ua);
  const isLine = /Line\//i.test(ua);

  // LINE in-app browser supports ?openExternalBrowser=1 — works on both iOS & Android
  if (isLine) {
    const sep = url.includes("?") ? "&" : "?";
    window.location.href = url + sep + "openExternalBrowser=1";
    return;
  }

  if (isAndroid) {
    // intent:// scheme — Android opens link in Chrome regardless of current app
    const cleanUrl = url.replace(/^https?:\/\//, "");
    const intentUrl = `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end`;
    window.location.href = intentUrl;
  } else if (isIOS) {
    // x-safari-https:// scheme — iOS opens link in Safari from in-app browsers
    const safariUrl = url.replace(/^https:\/\//, "x-safari-https://");
    window.location.href = safariUrl;
  } else {
    // Desktop — just navigate normally
    window.location.href = url;
  }
}

document.getElementById("t-cta").addEventListener("click", () => {
  if (!currentDoc) return;
  // Map language code to filename suffix (CN → zh)
  const langFile = { th: "th", en: "en", cn: "zh" }[currentLang];
  const targetFile = `${currentDoc}-${langFile}.html`;
  // Use URL constructor for robust absolute URL building
  // Resolves 'quotation-th.html' against current page URL → handles trailing slash correctly
  const targetUrl = new URL(targetFile, window.location.href).href;
  openInExternalBrowser(targetUrl);
});
</script>

</body>
</html>
